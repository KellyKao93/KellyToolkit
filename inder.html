<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelly's Toolkit</title>
    <style>
        :root { --primary: #e63946; --bg: #f8f9fa; }
        body { margin: 0; font-family: -apple-system, sans-serif; background: var(--bg); color: #333; }
        nav { background: var(--primary); padding: 15px; color: white; font-weight: bold; text-align: center; }
        
        .hero { 
            height: 90vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            color: white;
            text-align: center;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(3, 130px); 
            gap: 15px; 
            margin-bottom: 30px;
        }

        .card { 
            background: white; 
            aspect-ratio: 1/1; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            color: #333;
            border-radius: 4px;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .card:hover { transform: translateY(-5px); background: var(--primary); color: white; }
        .card b { font-size: 0.9rem; margin-top: 5px; }

        h1 { font-size: 3.5rem; margin-top: 0; letter-spacing: -2px; }
        p { opacity: 0.8; margin-bottom: 30px; }

        @media (max-width: 500px) { .grid { grid-template-columns: repeat(2, 130px); } }
    </style>
</head>
<body>

    <nav>KELLY TOOLKIT</nav>

    <header class="hero">
        <div class="grid">
            <a href="#" class="card">🚀<b>Projects</b></a>
            <a href="#" class="card">🛠️<b>Tools</b></a>
            <a href="#" class="card">🔒<b>Security</b></a>
            <a href="#" class="card">☁️<b>Azure</b></a>
            <a href="#" class="card">🏃<b>Running</b></a>
            <a href="#" class="card">📝<b>Notes</b></a>
        </div>
        <h1>Minimalist.</h1>
        <p>探索科技偵查與自動化開發的集散地</p>
    </header>

</body>
</html>

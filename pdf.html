<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 處理中心 | KellyToolkit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
</head>
<body class="pdf-page">


    <main class="pdf-layout">
        <aside class="pdf-sidebar">
            <div class="sidebar-item active" id="menu-crop" onclick="switchTool('crop')"><i class="fa-solid fa-crop"></i> 裁切頁面</div>
            <div class="sidebar-item" id="menu-merge" onclick="switchTool('merge')"><i class="fa-solid fa-object-group"></i> 合成檔案</div>
            <div class="sidebar-item" onclick="switchTool('number')"><i class="fa-solid fa-list-ol"></i> 編頁碼</div>
            <div class="sidebar-item" onclick="switchTool('rotate')"><i class="fa-solid fa-rotate"></i> 旋轉頁面</div>
            <div class="sidebar-item" onclick="switchTool('ocr')"><i class="fa-solid fa-eye"></i> 文字辨識</div>
        </aside>

        <section class="pdf-workspace">
            <div class="workspace-card">
                <h2 id="tool-title">裁切頁面</h2>
                <p id="tool-desc">請上傳 PDF 檔案，並指定要擷取的頁碼範圍。</p>

                <div class="upload-box" id="drop-zone" onclick="document.getElementById('file-input').click()">
                    <input type="file" id="file-input" hidden accept="application/pdf">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p id="upload-text">點擊上傳 PDF 檔案</p>
                </div>

                <div id="crop-options" class="tool-options-area">
                    <div class="input-group">
                        <label>起始頁碼</label>
                        <input type="number" id="start-page" min="1" value="1">
                    </div>
                    <div class="input-group">
                        <label>結束頁碼</label>
                        <input type="number" id="end-page" min="1" value="1">
                    </div>
                </div>

                <ul id="file-list" class="sortable-list" style="display: none;"></ul>

                <button class="btn-execute" id="execute-btn" onclick="handleExecute()">開始執行</button>
                
                <div id="status-msg" style="margin-top: 15px; color: var(--primary-red); font-weight: bold; text-align: center;"></div>
            </div>
        </section>
    </main>

    <script>
        let currentTool = 'crop';
        let selectedFiles = [];
        const { PDFDocument } = PDFLib;

        // 切換工具邏輯
        function switchTool(toolId) {
            currentTool = toolId;
            selectedFiles = []; // 切換工具時清空檔案
            document.getElementById('file-list').innerHTML = "";
            document.getElementById('upload-text').innerText = (toolId === 'merge') ? "點擊上傳多個 PDF (最多 10 份)" : "點擊上傳 PDF 檔案";
            document.getElementById('file-input').multiple = (toolId === 'merge');
            
            // UI 顯示切換
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`menu-${toolId}`)?.classList.add('active');
            
            const titles = { crop: "裁切頁面", merge: "合成檔案" };
            const descs = { crop: "指定要擷取的頁碼範圍（例如第 3 到第 5 頁）。", merge: "上傳多個檔案並拖曳排序進行合併。" };
            
            document.getElementById('tool-title').innerText = titles[toolId] || "開發中";
            document.getElementById('tool-desc').innerText = descs[toolId] || "此功能即將上線。";
            
            document.getElementById('crop-options').style.display = (toolId === 'crop') ? 'flex' : 'none';
            document.getElementById('file-list').style.display = (toolId === 'merge') ? 'block' : 'none';
            document.getElementById('status-msg').innerText = "";
        }

        // 檔案選取監聽
        document.getElementById('file-input').onchange = async function(e) {
            const files = Array.from(e.target.files);
            if (currentTool === 'merge') {
                selectedFiles = [...selectedFiles, ...files].slice(0, 10);
                renderFileList();
            } else {
                selectedFiles = [files[0]];
                document.getElementById('upload-text').innerText = "已選取: " + files[0].name;
                
                // 自動偵測總頁數並填入結束頁碼 (進階貼心功能)
                const reader = new FileReader();
                reader.onload = async (ex) => {
                    const pdf = await PDFDocument.load(ex.target.result);
                    const pageCount = pdf.getPageCount();
                    document.getElementById('end-page').value = pageCount;
                    document.getElementById('status-msg').innerText = `本文件共 ${pageCount} 頁`;
                };
                reader.readAsArrayBuffer(files[0]);
            }
        };

        function renderFileList() {
            const list = document.getElementById('file-list');
            list.innerHTML = "";
            selectedFiles.forEach((f, i) => {
                const li = document.createElement('li');
                li.className = "file-item";
                li.innerHTML = `<span>${f.name}</span><i class="fa-solid fa-trash" onclick="selectedFiles.splice(${i},1);renderFileList();"></i>`;
                list.appendChild(li);
            });
        }

        // 執行按鈕分流
        async function handleExecute() {
            if (selectedFiles.length === 0) return alert("請先上傳檔案");
            if (currentTool === 'crop') processCrop();
            else if (currentTool === 'merge') processMerge();
        }

        // 裁切邏輯 (擷取範圍)
        async function processCrop() {
            const status = document.getElementById('status-msg');
            const start = parseInt(document.getElementById('start-page').value);
            const end = parseInt(document.getElementById('end-page').value);

            status.innerText = "正在裁切中...";
            try {
                const fileBytes = await selectedFiles[0].arrayBuffer();
                const srcDoc = await PDFDocument.load(fileBytes);
                const totalPages = srcDoc.getPageCount();

                if (start < 1 || end > totalPages || start > end) {
                    throw new Error("頁碼範圍不正確");
                }

                const newDoc = await PDFDocument.create();
                // pdf-lib 索引從 0 開始，所以要 -1
                const indices = Array.from({length: (end - start + 1)}, (_, i) => start - 1 + i);
                const copiedPages = await newDoc.copyPages(srcDoc, indices);
                copiedPages.forEach(page => newDoc.addPage(page));

                const pdfBytes = await newDoc.save();
                downloadFile(pdfBytes, `cropped_${selectedFiles[0].name}`);
                status.innerText = "裁切成功！";
            } catch (err) {
                status.innerText = "錯誤: " + err.message;
            }
        }

        async function processMerge() {
            // (此處保留上一篇提供的 processMerge 邏輯代碼...)
            const status = document.getElementById('status-msg');
            status.innerText = "正在合併中...";
            const mergedPdf = await PDFDocument.create();
            for (const f of selectedFiles) {
                const b = await f.arrayBuffer();
                const p = await PDFDocument.load(b);
                const pages = await mergedPdf.copyPages(p, p.getPageIndices());
                pages.forEach(pg => mergedPdf.addPage(pg));
            }
            const res = await mergedPdf.save();
            downloadFile(res, "merged_file.pdf");
            status.innerText = "合併成功！";
        }

        function downloadFile(bytes, name) {
            const blob = new Blob([bytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = name;
            link.click();
        }
    </script>
</body>
</html>

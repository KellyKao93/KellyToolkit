<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 處理中心 | KellyToolkit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
</head>
<body class="pdf-page">

    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo">KellyToolkit</a>
        </div>
    </nav>

    <main class="pdf-layout">
        <aside class="pdf-sidebar">
            <div class="sidebar-item" id="menu-crop" onclick="switchTool('crop')"><i class="fa-solid fa-crop"></i> 裁切頁面</div>
            <div class="sidebar-item" id="menu-merge" onclick="switchTool('merge')"><i class="fa-solid fa-object-group"></i> 合成檔案</div>
            <div class="sidebar-item active" id="menu-number" onclick="switchTool('number')"><i class="fa-solid fa-list-ol"></i> 編頁碼</div>
            <div class="sidebar-item" id="menu-rotate" onclick="switchTool('rotate')"><i class="fa-solid fa-rotate"></i> 旋轉頁面</div>
            <div class="sidebar-item" id="menu-ocr" onclick="switchTool('ocr')"><i class="fa-solid fa-eye"></i> 文字辨識</div>
        </aside>

        <section class="pdf-workspace">
            <div class="workspace-card">
                <h2 id="tool-title">編頁碼</h2>
                <p id="tool-desc">請上傳 PDF 檔案，並設定頁碼顯示的位置。</p>

                <div class="upload-box" id="drop-zone" onclick="document.getElementById('file-input').click()">
                    <input type="file" id="file-input" hidden accept="application/pdf">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                    <p id="upload-text">點擊上傳 PDF 檔案</p>
                </div>

                <div id="crop-options" class="tool-options-area" style="display: none;">
                    <div class="input-group">
                        <label>起始頁碼</label>
                        <input type="number" id="start-page" min="1" value="1">
                    </div>
                    <div class="input-group">
                        <label>結束頁碼</label>
                        <input type="number" id="end-page" min="1" value="1">
                    </div>
                </div>

                <div id="number-options" class="tool-options-area">
                    <div class="radio-group">
                        <label>頁碼位置</label>
                        <div class="radio-options">
                            <label><input type="radio" name="pos" value="left"> 左下</label>
                            <label><input type="radio" name="pos" value="center" checked> 正中</label>
                            <label><input type="radio" name="pos" value="right"> 右下</label>
                        </div>
                    </div>
                </div>

                <ul id="file-list" class="sortable-list" style="display: none;"></ul>

                <button class="btn-execute" onclick="handleExecute()">開始執行</button>
                
                <div id="status-msg" style="margin-top: 15px; color: var(--primary-red); font-weight: bold; text-align: center;"></div>
            </div>
        </section>
    </main>

    <script>
        let currentTool = 'number';
        let selectedFiles = [];
        const { PDFDocument, StandardFonts, rgb } = PDFLib;

        function switchTool(toolId) {
            currentTool = toolId;
            selectedFiles = [];
            document.getElementById('file-list').innerHTML = "";
            document.getElementById('upload-text').innerText = "點擊上傳 PDF 檔案";
            document.getElementById('file-input').multiple = (toolId === 'merge');
            
            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`menu-${toolId}`)?.classList.add('active');
            
            document.getElementById('tool-title').innerText = (toolId === 'number' ? "編頁碼" : (toolId === 'crop' ? "裁切頁面" : "合成檔案"));
            document.getElementById('crop-options').style.display = (toolId === 'crop') ? 'flex' : 'none';
            document.getElementById('number-options').style.display = (toolId === 'number') ? 'flex' : 'none';
            document.getElementById('file-list').style.display = (toolId === 'merge') ? 'block' : 'none';
            document.getElementById('status-msg').innerText = "";
        }

        document.getElementById('file-input').onchange = async function(e) {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                selectedFiles = [files[0]];
                document.getElementById('upload-text').innerText = "已選取: " + files[0].name;
            }
        };

        async function handleExecute() {
            if (selectedFiles.length === 0) return alert("請先上傳檔案");
            if (currentTool === 'number') processNumbering();
            else if (currentTool === 'crop') processCrop();
            // merge 邏輯略...
        }

        async function processNumbering() {
            const status = document.getElementById('status-msg');
            const position = document.querySelector('input[name="pos"]:checked').value;
            status.innerText = "正在編碼中...";

            try {
                const fileBytes = await selectedFiles[0].arrayBuffer();
                const pdfDoc = await PDFDocument.load(fileBytes);
                const pages = pdfDoc.getPages();
                const font = await pdfDoc.embedFont(StandardFonts.Helvetica);

                pages.forEach((page, index) => {
                    const { width, height } = page.getSize();
                    const pageNum = (index + 1).toString();
                    const fontSize = 12;
                    const textWidth = font.widthOfTextAtSize(pageNum, fontSize);
                    
                    let x;
                    if (position === 'left') x = 50;
                    else if (position === 'center') x = width / 2 - textWidth / 2;
                    else x = width - 50 - textWidth;

                    page.drawText(pageNum, {
                        x: x,
                        y: 25, // 距離底部 25 單位
                        size: fontSize,
                        font: font,
                        color: rgb(0, 0, 0),
                    });
                });

                const pdfBytes = await pdfDoc.save();
                downloadFile(pdfBytes, `numbered_${selectedFiles[0].name}`);
                status.innerText = "編碼成功！";
            } catch (err) {
                status.innerText = "錯誤: " + err.message;
            }
        }

        // 下載與其他函數維持不變...
        function downloadFile(bytes, name) {
            const blob = new Blob([bytes], { type: "application/pdf" });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = name;
            link.click();
        }
    </script>
</body>
</html>
